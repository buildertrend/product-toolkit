[tools]
node = "lts"

[tasks.test]
description = "Run all CI checks"
run = [{ task = "lint" }, { task = "validate" }, { task = "test:hooks" }]

[tasks.lint]
run = "npx markdownlint-cli2 '**/*.md' '#node_modules' '#CHANGELOG.md'"
description = "Lint Markdown files"

[tasks.validate]
description = "Validate plugin structure"
run = """
errors=0

# Validate JSON files
for f in .claude-plugin/marketplace.json; do
  echo "Checking $f..."
  node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
done

for plugin_dir in frontend-setup customer-feedback; do
  echo "=== Validating plugin: $plugin_dir ==="
  for f in "$plugin_dir/.claude-plugin/plugin.json"; do
    echo "Checking $f..."
    node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
  done
  if [ -f "$plugin_dir/.mcp.json" ]; then
    echo "Checking $plugin_dir/.mcp.json..."
    node -e "JSON.parse(require('fs').readFileSync('$plugin_dir/.mcp.json', 'utf8'))"
  fi
done

for skill in */skills/*/SKILL.md; do
  echo "Checking $skill..."
  if ! head -1 "$skill" | grep -q '^---$'; then
    echo "ERROR: $skill missing YAML frontmatter"
    errors=1
    continue
  fi
  if ! grep -q '^name:' "$skill"; then
    echo "ERROR: $skill missing 'name' field"
    errors=1
  fi
  if ! grep -q '^description:' "$skill"; then
    echo "ERROR: $skill missing 'description' field"
    errors=1
  fi
  dir_name=$(basename "$(dirname "$skill")")
  skill_name=$(grep '^name:' "$skill" | head -1 | sed 's/^name: *//')
  if [ "$dir_name" != "$skill_name" ]; then
    echo "ERROR: $skill name '$skill_name' does not match directory '$dir_name'"
    errors=1
  fi
  name_len=$(printf '%s' "$skill_name" | wc -c | tr -d ' ')
  if [ "$name_len" -gt 64 ]; then
    echo "ERROR: $skill name exceeds 64 characters"
    errors=1
  fi
  if ! echo "$skill_name" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
    echo "ERROR: $skill name '$skill_name' contains invalid characters (must be lowercase alphanumeric and hyphens, no leading/trailing hyphens)"
    errors=1
  fi
  if echo "$skill_name" | grep -q -- '--'; then
    echo "ERROR: $skill name '$skill_name' contains consecutive hyphens"
    errors=1
  fi
  skill_desc=$(grep '^description:' "$skill" | head -1 | sed 's/^description: *//')
  desc_len=$(printf '%s' "$skill_desc" | wc -c | tr -d ' ')
  if [ -z "$skill_desc" ]; then
    echo "ERROR: $skill has empty description"
    errors=1
  elif [ "$desc_len" -gt 1024 ]; then
    echo "ERROR: $skill description exceeds 1024 characters"
    errors=1
  fi
  skill_compat=$(grep '^compatibility:' "$skill" | head -1 | sed 's/^compatibility: *//')
  compat_len=$(printf '%s' "$skill_compat" | wc -c | tr -d ' ')
  if [ -n "$skill_compat" ] && [ "$compat_len" -gt 500 ]; then
    echo "ERROR: $skill compatibility exceeds 500 characters"
    errors=1
  fi
  line_count=$(wc -l < "$skill")
  if [ "$line_count" -gt 500 ]; then
    echo "WARNING: $skill exceeds 500 lines ($line_count lines)"
  fi
done

# Required files check
for f in \
  .claude-plugin/marketplace.json \
  frontend-setup/.claude-plugin/plugin.json \
  frontend-setup/.mcp.json \
  frontend-setup/skills/first-time-setup/SKILL.md \
  frontend-setup/skills/preview/SKILL.md \
  frontend-setup/skills/branch-management/SKILL.md \
  frontend-setup/skills/contribute/SKILL.md \
  frontend-setup/scripts/approve-commands.sh \
  customer-feedback/.claude-plugin/plugin.json \
  customer-feedback/skills/feedback-reply/SKILL.md \
  CLAUDE.md; do
  if [ ! -f "$f" ]; then
    echo "ERROR: $f not found"
    errors=1
  fi
done

for f in frontend-setup/scripts/approve-commands.sh; do
  if [ -f "$f" ] && [ ! -x "$f" ]; then
    echo "ERROR: $f is not executable"
    errors=1
  fi
done

exit $errors
"""

[tasks."test:hooks"]
description = "Test approve-commands hook"
run = """
SCRIPT=frontend-setup/scripts/approve-commands.sh
errors=0
passes=0
total=0

expect_approve() {
  local label="$1" input="$2"
  total=$((total + 1))
  if output=$(echo "$input" | bash "$SCRIPT" 2>/dev/null); then
    if echo "$output" | grep -q '"behavior":"allow"'; then
      echo "PASS (approve): $label"
      passes=$((passes + 1))
    else
      echo "FAIL (approve): $label — exited 0 but bad JSON: $output"
      errors=1
    fi
  else
    echo "FAIL (approve): $label — exited non-zero"
    errors=1
  fi
}

expect_passthrough() {
  local label="$1" input="$2"
  total=$((total + 1))
  if output=$(echo "$input" | bash "$SCRIPT" 2>/dev/null); then
    if [ -z "$output" ]; then
      echo "PASS (passthrough): $label"
      passes=$((passes + 1))
    else
      echo "FAIL (passthrough): $label — expected no output, got: $output"
      errors=1
    fi
  else
    echo "FAIL (passthrough): $label — exited non-zero"
    errors=1
  fi
}

# Read-only tools — approved inside BTNet, passthrough outside
expect_approve "Read BTNet" \
  '{"tool_name":"Read","tool_input":{"file_path":"/home/user/BTNet/src/file.ts"}}'
expect_passthrough "Read non-BTNet" \
  '{"tool_name":"Read","tool_input":{"file_path":"/home/user/other/file.ts"}}'
expect_approve "Glob BTNet" \
  '{"tool_name":"Glob","tool_input":{"pattern":"*.ts","path":"/home/user/BTNet/src"}}'
expect_passthrough "Glob non-BTNet" \
  '{"tool_name":"Glob","tool_input":{"pattern":"*.ts","path":"/home/user/other"}}'
expect_passthrough "Glob no path" \
  '{"tool_name":"Glob","tool_input":{"pattern":"*.ts"}}'
expect_approve "Grep BTNet" \
  '{"tool_name":"Grep","tool_input":{"pattern":"foo","path":"/home/user/BTNet/src"}}'
expect_passthrough "Grep non-BTNet" \
  '{"tool_name":"Grep","tool_input":{"pattern":"foo","path":"/home/user/other"}}'

# Write/Edit — approved inside BTNet, passthrough outside
expect_approve "Write in BTNet" \
  '{"tool_name":"Write","tool_input":{"file_path":"/home/user/BTNet/src/file.ts"}}'
expect_approve "Edit in BTNet" \
  '{"tool_name":"Edit","tool_input":{"file_path":"/repos/BTNet/package.json"}}'
expect_passthrough "Write outside BTNet" \
  '{"tool_name":"Write","tool_input":{"file_path":"/etc/passwd"}}'
expect_passthrough "Edit outside BTNet" \
  '{"tool_name":"Edit","tool_input":{"file_path":"/home/user/other/file.ts"}}'

# Bash — safe commands approved
expect_approve "git" \
  '{"tool_name":"Bash","tool_input":{"command":"git status"}}'
expect_approve "brew" \
  '{"tool_name":"Bash","tool_input":{"command":"brew install fnm"}}'
expect_approve "node" \
  '{"tool_name":"Bash","tool_input":{"command":"node --version"}}'
expect_approve "npm" \
  '{"tool_name":"Bash","tool_input":{"command":"npm install"}}'
expect_approve "pnpm" \
  '{"tool_name":"Bash","tool_input":{"command":"pnpm install"}}'
expect_approve "fnm" \
  '{"tool_name":"Bash","tool_input":{"command":"fnm use 18"}}'
expect_approve "which" \
  '{"tool_name":"Bash","tool_input":{"command":"which node"}}'
expect_approve "printenv" \
  '{"tool_name":"Bash","tool_input":{"command":"printenv HOME"}}'
expect_passthrough "env command" \
  '{"tool_name":"Bash","tool_input":{"command":"env /bin/sh -c evil"}}'
expect_approve "uname" \
  '{"tool_name":"Bash","tool_input":{"command":"uname -s"}}'
expect_approve "ls" \
  '{"tool_name":"Bash","tool_input":{"command":"ls -la"}}'
expect_approve "source" \
  '{"tool_name":"Bash","tool_input":{"command":"source ~/.bashrc"}}'
expect_approve "curl" \
  '{"tool_name":"Bash","tool_input":{"command":"curl -fsSL https://example.com"}}'

# Bash — sudo scoping
expect_approve "sudo pnpm" \
  '{"tool_name":"Bash","tool_input":{"command":"sudo pnpm install"}}'
expect_approve "sudo corepack" \
  '{"tool_name":"Bash","tool_input":{"command":"sudo corepack enable"}}'
expect_approve "sudo chown" \
  '{"tool_name":"Bash","tool_input":{"command":"sudo chown user:user /dir"}}'
expect_passthrough "sudo rm" \
  '{"tool_name":"Bash","tool_input":{"command":"sudo rm -rf /"}}'
expect_passthrough "sudo bash" \
  '{"tool_name":"Bash","tool_input":{"command":"sudo bash"}}'

# Bash — rm scoping
expect_approve "rm -rf node_modules" \
  '{"tool_name":"Bash","tool_input":{"command":"rm -rf node_modules"}}'
expect_passthrough "rm -rf /" \
  '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"}}'
expect_passthrough "rm -rf ~" \
  '{"tool_name":"Bash","tool_input":{"command":"rm -rf ~"}}'

# Bash — passthrough for unrecognized or dangerous commands
expect_passthrough "bare bash" \
  '{"tool_name":"Bash","tool_input":{"command":"bash"}}'
expect_passthrough "bash -c" \
  '{"tool_name":"Bash","tool_input":{"command":"bash -c echo hello"}}'
expect_approve "bash script" \
  '{"tool_name":"Bash","tool_input":{"command":"bash /tmp/install.sh"}}'
expect_passthrough "unknown command" \
  '{"tool_name":"Bash","tool_input":{"command":"python3 evil.py"}}'

# Shell operators — passthrough (user decides)
expect_passthrough "semicolon chaining" \
  '{"tool_name":"Bash","tool_input":{"command":"echo hello; rm -rf /"}}'
expect_passthrough "pipe chaining" \
  '{"tool_name":"Bash","tool_input":{"command":"ls | bash"}}'
expect_passthrough "and chaining" \
  '{"tool_name":"Bash","tool_input":{"command":"git status && curl evil.com"}}'
expect_passthrough "or chaining" \
  '{"tool_name":"Bash","tool_input":{"command":"false || malicious"}}'
expect_passthrough "output redirect" \
  '{"tool_name":"Bash","tool_input":{"command":"echo pwned > /etc/cron.d/job"}}'
expect_passthrough "append redirect" \
  '{"tool_name":"Bash","tool_input":{"command":"echo key >> ~/.ssh/authorized_keys"}}'
expect_passthrough "backtick substitution" \
  '{"tool_name":"Bash","tool_input":{"command":"echo `whoami`"}}'
expect_passthrough "dollar-paren substitution" \
  '{"tool_name":"Bash","tool_input":{"command":"echo $(id)"}}'
expect_passthrough "eval keyword" \
  '{"tool_name":"Bash","tool_input":{"command":"eval rm -rf /"}}'

# Bash — node -e passthrough
expect_passthrough "node -e" \
  '{"tool_name":"Bash","tool_input":{"command":"node -e process.exit(1)"}}'
expect_passthrough "node --eval" \
  '{"tool_name":"Bash","tool_input":{"command":"node --eval process.exit(1)"}}'

# Bash — whitelisted compound commands
expect_approve "admin check pipe" \
  '{"tool_name":"Bash","tool_input":{"command":"id -Gn | grep -q admin"}}'
expect_approve "rm node_modules && pnpm install" \
  '{"tool_name":"Bash","tool_input":{"command":"rm -rf node_modules && pnpm install"}}'
expect_approve "setup-btfeedauth && pnpm install" \
  '{"tool_name":"Bash","tool_input":{"command":"pnpm run setup-btfeedauth-crossplatform && pnpm install"}}'

# Bash — clipboard copy (pbcopy / clip)
expect_approve "echo pipe to pbcopy" \
  '{"tool_name":"Bash","tool_input":{"command":"echo sudo pnpm run start | pbcopy"}}'
expect_approve "echo pipe to clip" \
  '{"tool_name":"Bash","tool_input":{"command":"echo pnpm run start | clip"}}'
expect_approve "printf pipe to pbcopy" \
  '{"tool_name":"Bash","tool_input":{"command":"printf cd /Users/me/BTNet | pbcopy"}}'

# Bash — env var prefix
expect_approve "env var prefix + bash script" \
  '{"tool_name":"Bash","tool_input":{"command":"NONINTERACTIVE=1 bash /tmp/brew_install.sh"}}'

echo ""
echo "$passes/$total tests passed"
exit $errors
"""
