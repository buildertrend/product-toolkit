name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        run: npx markdownlint-cli2 '**/*.md' '#node_modules'

  validate-plugin-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .mcp.json; do
            echo "Checking $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - name: Validate command frontmatter
        run: |
          errors=0
          for cmd in commands/*.md; do
            echo "Checking $cmd..."
            if ! head -1 "$cmd" | grep -q '^---$'; then
              echo "ERROR: $cmd missing YAML frontmatter"
              errors=1
              continue
            fi
            if ! grep -q '^description:' "$cmd"; then
              echo "ERROR: $cmd missing 'description' field"
              errors=1
            fi
          done
          exit $errors

      - name: Check referenced files exist
        run: |
          errors=0
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            .mcp.json \
            commands/frontend-setup.md \
            scripts/approve-commands.sh \
            scripts/install-deps.sh \
            CLAUDE.md; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found"
              errors=1
            fi
          done
          exit $errors

      - name: Check hook scripts are executable
        run: |
          errors=0
          for f in scripts/approve-commands.sh scripts/install-deps.sh; do
            if [ -f "$f" ] && [ ! -x "$f" ]; then
              echo "ERROR: $f is not executable"
              errors=1
            fi
          done
          exit $errors

  test-approve-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test hook approvals and denials
        run: |
          SCRIPT=scripts/approve-commands.sh
          errors=0

          expect_approve() {
            local label="$1" input="$2"
            if output=$(echo "$input" | bash "$SCRIPT" 2>/dev/null); then
              if echo "$output" | grep -q '"behavior":"allow"'; then
                echo "PASS (approve): $label"
              else
                echo "FAIL (approve): $label — exited 0 but bad JSON: $output"
                errors=1
              fi
            else
              echo "FAIL (approve): $label — exited non-zero"
              errors=1
            fi
          }

          expect_deny() {
            local label="$1" input="$2"
            if echo "$input" | bash "$SCRIPT" 2>/dev/null; then
              echo "FAIL (deny): $label — exited 0, expected non-zero"
              errors=1
            else
              echo "PASS (deny): $label"
            fi
          }

          # Read-only tools — always approved
          expect_approve "Read tool" \
            '{"tool_name":"Read","tool_input":{"file_path":"/anything"}}'
          expect_approve "Glob tool" \
            '{"tool_name":"Glob","tool_input":{"pattern":"*.ts"}}'
          expect_approve "Grep tool" \
            '{"tool_name":"Grep","tool_input":{"pattern":"foo"}}'

          # Write/Edit — approved inside BTNet, denied outside
          expect_approve "Write in BTNet" \
            '{"tool_name":"Write","tool_input":{"file_path":"/home/user/BTNet/src/file.ts"}}'
          expect_approve "Edit in BTNet" \
            '{"tool_name":"Edit","tool_input":{"file_path":"/repos/BTNet/package.json"}}'
          expect_deny "Write outside BTNet" \
            '{"tool_name":"Write","tool_input":{"file_path":"/etc/passwd"}}'
          expect_deny "Edit outside BTNet" \
            '{"tool_name":"Edit","tool_input":{"file_path":"/home/user/other/file.ts"}}'

          # Bash — safe commands approved
          expect_approve "git" \
            '{"tool_name":"Bash","tool_input":{"command":"git status"}}'
          expect_approve "brew" \
            '{"tool_name":"Bash","tool_input":{"command":"brew install fnm"}}'
          expect_approve "node" \
            '{"tool_name":"Bash","tool_input":{"command":"node --version"}}'
          expect_approve "npm" \
            '{"tool_name":"Bash","tool_input":{"command":"npm install"}}'
          expect_approve "pnpm" \
            '{"tool_name":"Bash","tool_input":{"command":"pnpm install"}}'
          expect_approve "fnm" \
            '{"tool_name":"Bash","tool_input":{"command":"fnm use 18"}}'
          expect_approve "which" \
            '{"tool_name":"Bash","tool_input":{"command":"which node"}}'
          expect_approve "uname" \
            '{"tool_name":"Bash","tool_input":{"command":"uname -s"}}'
          expect_approve "ls" \
            '{"tool_name":"Bash","tool_input":{"command":"ls -la"}}'
          expect_approve "source" \
            '{"tool_name":"Bash","tool_input":{"command":"source ~/.bashrc"}}'
          expect_approve "curl" \
            '{"tool_name":"Bash","tool_input":{"command":"curl -fsSL https://example.com"}}'

          # Bash — sudo scoping
          expect_approve "sudo pnpm" \
            '{"tool_name":"Bash","tool_input":{"command":"sudo pnpm install"}}'
          expect_approve "sudo corepack" \
            '{"tool_name":"Bash","tool_input":{"command":"sudo corepack enable"}}'
          expect_approve "sudo chown" \
            '{"tool_name":"Bash","tool_input":{"command":"sudo chown user:user /dir"}}'
          expect_deny "sudo rm" \
            '{"tool_name":"Bash","tool_input":{"command":"sudo rm -rf /"}}'
          expect_deny "sudo bash" \
            '{"tool_name":"Bash","tool_input":{"command":"sudo bash"}}'

          # Bash — rm scoping
          expect_approve "rm -rf node_modules" \
            '{"tool_name":"Bash","tool_input":{"command":"rm -rf node_modules"}}'
          expect_deny "rm -rf /" \
            '{"tool_name":"Bash","tool_input":{"command":"rm -rf /"}}'
          expect_deny "rm -rf ~" \
            '{"tool_name":"Bash","tool_input":{"command":"rm -rf ~"}}'

          # Bash — denied commands
          expect_deny "bare bash" \
            '{"tool_name":"Bash","tool_input":{"command":"bash"}}'
          expect_deny "unknown command" \
            '{"tool_name":"Bash","tool_input":{"command":"python3 evil.py"}}'

          # Unknown tool — denied
          expect_deny "unknown tool" \
            '{"tool_name":"SomethingElse","tool_input":{}}'

          # Missing/empty input — denied
          expect_deny "empty tool name" \
            '{"tool_name":"","tool_input":{}}'
          expect_deny "empty bash command" \
            '{"tool_name":"Bash","tool_input":{"command":""}}'

          exit $errors
